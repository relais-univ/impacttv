<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact TV - Test complet</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0f; color: white; text-align: center; padding: 20px; }
        button { margin: 10px; padding: 12px 24px; font-size: 1rem; cursor: pointer; background: #ffd700; border: none; border-radius: 30px; color: black; font-weight: bold; }
        video { max-width: 100%; border-radius: 16px; margin-bottom: 20px; }
        .action-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .search-area { max-width: 600px; margin: 20px auto; }
        input[type="text"] { padding: 10px; width: 80%; border-radius: 30px; border: none; margin: 5px; }
        .verse-card { background: rgba(255,215,0,0.1); border-left: 4px solid gold; padding: 15px; margin: 15px 0; text-align: left; border-radius: 12px; }
        .verse-ref { color: gold; font-weight: bold; margin-bottom: 5px; }
        .emission-card { background: #1a1a2e; border-radius: 12px; padding: 10px; margin: 10px; text-align: left; display: inline-block; width: 280px; vertical-align: top; }
        .emission-img { width: 100%; border-radius: 8px; }
        .emission-title { font-weight: bold; margin: 8px 0; }
        .emission-date { color: #ffd700; font-size: 0.8rem; }
        .comment-area { margin-top: 30px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
        .comment { background: #1a1a2e; padding: 10px; margin: 5px 0; border-radius: 10px; }
        .replay-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<h1>IMPACT TV - TEST COMPLET</h1>

<video id="mainVideo" controls width="100%">
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<div class="action-bar">
    <button id="watchBtn">▶ Regarder</button>
    <button id="likeBtn">❤️ Like (<span id="likeCount">0</span>)</button>
    <button id="commentBtn">💬 Commentaires</button>
    <button id="shareBtn">📤 Partager</button>
    <button id="downloadBtn">⬇️ Télécharger</button>
</div>

<!-- RECHERCHE -->
<div class="search-area">
    <input type="text" id="searchInput" placeholder="Rechercher un verset (ex: Jean 1.1) ou une émission...">
    <div id="verseResult"></div>
</div>

<!-- ÉMISSIONS (replays) -->
<h3>📺 DERNIÈRES ÉMISSIONS</h3>
<div id="emissionsGrid" class="replay-grid">
    <div class="emission-card" data-title="Culte du Dimanche - Réveil Spirituel" data-desc="Un culte puissant">
        <img class="emission-img" src="https://via.placeholder.com/280x160/1a1a2e/ffd700?text=Culte">
        <div class="emission-title">Culte du Dimanche - Réveil Spirituel</div>
        <div class="emission-date">24 mars 2024</div>
        <button class="play-emission" data-url="https://www.w3schools.com/html/mov_bbb.mp4">▶ Regarder</button>
        <button class="download-emission" data-url="https://www.w3schools.com/html/mov_bbb.mp4">⬇️ Télécharger</button>
        <button class="share-emission" data-title="Culte du Dimanche" data-url="https://www.w3schools.com/html/mov_bbb.mp4">📤 Partager</button>
    </div>
    <div class="emission-card" data-title="Enseignement Biblique - La Foi" data-desc="Découvrez la foi">
        <img class="emission-img" src="https://via.placeholder.com/280x160/1a1a2e/ffd700?text=Enseignement">
        <div class="emission-title">Enseignement Biblique - La Foi</div>
        <div class="emission-date">23 mars 2024</div>
        <button class="play-emission" data-url="https://www.w3schools.com/html/movie.mp4">▶ Regarder</button>
        <button class="download-emission" data-url="https://www.w3schools.com/html/movie.mp4">⬇️ Télécharger</button>
        <button class="share-emission" data-title="Enseignement Biblique" data-url="https://www.w3schools.com/html/movie.mp4">📤 Partager</button>
    </div>
</div>

<!-- COMMENTAIRES -->
<div class="comment-area" id="commentsSection">
    <h3>💬 Commentaires</h3>
    <input type="text" id="commentInput" placeholder="Écrivez votre commentaire...">
    <button id="postCommentBtn">Envoyer</button>
    <div id="commentList"></div>
</div>

<button id="whatsappBtn">💬 WhatsApp : 25 36 72 72</button>

<script>
    // ========== VARIABLES ==========
    let likeCount = 0;
    let currentVideoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";
    let currentVideoTitle = "Impact TV - Direct";
    
    // ========== BOUTON REGARDER ==========
    document.getElementById('watchBtn').onclick = () => {
        const video = document.getElementById('mainVideo');
        video.src = currentVideoUrl;
        video.load();
        video.play();
        alert('▶ Lecture lancée !');
    };
    
    // ========== BOUTON LIKE ==========
    const likeBtn = document.getElementById('likeBtn');
    const likeSpan = document.getElementById('likeCount');
    likeBtn.onclick = () => {
        likeCount++;
        likeSpan.textContent = likeCount;
        likeBtn.style.background = '#ff4d4d';
        alert('❤️ Like ajouté ! Total : ' + likeCount);
    };
    
    // ========== BOUTON COMMENTAIRES (scroll) ==========
    document.getElementById('commentBtn').onclick = () => {
        document.getElementById('commentsSection').scrollIntoView({ behavior: 'smooth' });
        alert('💬 Défilement vers les commentaires');
    };
    
    // ========== BOUTON PARTAGER ==========
    document.getElementById('shareBtn').onclick = () => {
        if (navigator.share) {
            navigator.share({ title: 'Impact TV', text: 'Regardez Impact TV', url: window.location.href });
        } else {
            alert('📋 Partage : lien copié dans le presse-papier');
            navigator.clipboard.writeText(window.location.href);
        }
    };
    
    // ========== BOUTON TÉLÉCHARGER ==========
    document.getElementById('downloadBtn').onclick = () => {
        const video = document.getElementById('mainVideo');
        const videoUrl = video.currentSrc || video.src;
        if (!videoUrl) return alert('Aucune vidéo');
        const a = document.createElement('a');
        a.href = videoUrl;
        a.download = 'video.mp4';
        a.click();
        alert('⬇️ Téléchargement démarré !');
    };
    
    // ========== RECHERCHE BIBLIQUE + ÉMISSIONS ==========
    async function fetchBibleVerse(reference) {
        try {
            const res = await fetch(`https://bible-api.com/${encodeURIComponent(reference)}?translation=LSG`);
            const data = await res.json();
            if (data.error) return null;
            return { text: data.text, reference: data.reference };
        } catch { return null; }
    }
    
    function filterEmissions(searchTerm) {
        const cards = document.querySelectorAll('.emission-card');
        let hasMatch = false;
        cards.forEach(card => {
            const title = card.getAttribute('data-title').toLowerCase();
            const desc = card.getAttribute('data-desc').toLowerCase();
            if (title.includes(searchTerm) || desc.includes(searchTerm)) {
                card.style.display = 'inline-block';
                hasMatch = true;
            } else {
                card.style.display = 'none';
            }
        });
        return hasMatch;
    }
    
    document.getElementById('searchInput').oninput = async (e) => {
        const query = e.target.value.trim();
        const verseDiv = document.getElementById('verseResult');
        
        if (!query) {
            verseDiv.innerHTML = '';
            filterEmissions('');
            return;
        }
        
        // Recherche biblique
        const match = query.match(/^([a-zéêèçàîôû]+)\s*(\d+)(?::(\d+))?$/i);
        if (match) {
            const ref = match[3] ? `${match[1]} ${match[2]}:${match[3]}` : `${match[1]} ${match[2]}`;
            const verse = await fetchBibleVerse(ref);
            if (verse) {
                verseDiv.innerHTML = `<div class="verse-card">
                    <div class="verse-ref">📖 ${verse.reference}</div>
                    <div>${verse.text}</div>
                </div>`;
            } else {
                verseDiv.innerHTML = `<div class="verse-card">Verset non trouvé.</div>`;
            }
        } else {
            verseDiv.innerHTML = '';
        }
        
        // Filtre les émissions
        const hasEmissions = filterEmissions(query.toLowerCase());
        if (!hasEmissions && !match) {
            verseDiv.innerHTML += `<div class="verse-card">Aucune émission trouvée pour "${escapeHtml(query)}"</div>`;
        }
    };
    
    // ========== ACTIONS SUR LES ÉMISSIONS ==========
    document.querySelectorAll('.play-emission').forEach(btn => {
        btn.onclick = () => {
            const url = btn.getAttribute('data-url');
            const title = btn.closest('.emission-card').getAttribute('data-title');
            const video = document.getElementById('mainVideo');
            video.src = url;
            video.load();
            video.play();
            currentVideoUrl = url;
            currentVideoTitle = title;
            alert(`▶ Lecture: ${title}`);
        };
    });
    
    document.querySelectorAll('.download-emission').forEach(btn => {
        btn.onclick = () => {
            const url = btn.getAttribute('data-url');
            const a = document.createElement('a');
            a.href = url;
            a.download = 'emission.mp4';
            a.click();
            alert('⬇️ Téléchargement démarré !');
        };
    });
    
    document.querySelectorAll('.share-emission').forEach(btn => {
        btn.onclick = () => {
            const title = btn.getAttribute('data-title');
            const url = btn.getAttribute('data-url');
            if (navigator.share) {
                navigator.share({ title: title, text: `Regardez "${title}" sur Impact TV`, url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert(`📋 Lien de "${title}" copié !`);
            }
        };
    });
    
    // ========== COMMENTAIRES ==========
    let comments = [];
    let userId = localStorage.getItem('userId');
    if (!userId) {
        userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        localStorage.setItem('userId', userId);
    }
    
    function renderComments() {
        const container = document.getElementById('commentList');
        if (comments.length === 0) {
            container.innerHTML = '<div class="comment">Aucun commentaire. Soyez le premier !</div>';
            return;
        }
        container.innerHTML = comments.map(c => `
            <div class="comment">
                <strong>${escapeHtml(c.username)}</strong> <small>${c.date}</small>
                ${c.userId === userId ? `<button onclick="deleteComment(${c.id})" style="float:right; background:red; color:white; border:none; border-radius:10px; padding:2px 8px;">🗑️</button>` : ''}
                <div>${escapeHtml(c.text)}</div>
            </div>
        `).join('');
    }
    
    function deleteComment(id) {
        comments = comments.filter(c => c.id !== id);
        localStorage.setItem('comments', JSON.stringify(comments));
        renderComments();
        alert('Commentaire supprimé');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    const savedComments = localStorage.getItem('comments');
    if (savedComments) comments = JSON.parse(savedComments);
    renderComments();
    
    document.getElementById('postCommentBtn').onclick = () => {
        const input = document.getElementById('commentInput');
        const text = input.value.trim();
        if (!text) return alert('Écrivez un commentaire');
        comments.unshift({
            id: Date.now(),
            text: text,
            username: 'Visiteur',
            userId: userId,
            date: new Date().toLocaleString()
        });
        localStorage.setItem('comments', JSON.stringify(comments));
        renderComments();
        input.value = '';
        alert('Commentaire ajouté !');
    };
    
    // ========== WHATSAPP ==========
    document.getElementById('whatsappBtn').onclick = () => {
        window.open('https://wa.me/22625367272?text=Bonjour%20Impact%20TV', '_blank');
        alert('Ouverture de WhatsApp');
    };
    
    window.deleteComment = deleteComment;
    alert('✅ Tous les boutons sont prêts ! Testez la recherche biblique et les émissions.');
</script>

</body>
      </html>
