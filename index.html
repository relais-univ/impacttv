<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Impact TV – La Télévision du Royaume des Cieux</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }
        .header { background: linear-gradient(135deg, #0a0a0f, #1a1a2e); padding: 20px; text-align: center; border-bottom: 3px solid #ffd700; }
        .header h1 { font-size: 2rem; font-weight: 800; color: #3b82f6; }
        .header h1 span { color: #ff8c00; }
        .slogan { font-size: 0.8rem; color: #ff8c00; margin-top: 5px; }
        
        .player-container { max-width: 1000px; margin: 15px auto; padding: 0 15px; }
        .video-box { position: relative; background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; outline: none; background: #000; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: #e74c3c; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: flex; align-items: center; gap: 5px; z-index: 15; }
        .live-badge i { animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .action-bar {
            display: flex;
            justify-content: space-around;
            background: #1a1a2e;
            border-radius: 60px;
            padding: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .action-btn {
            background: none;
            border: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            font-weight: 500;
        }
        .action-btn i { font-size: 1.5rem; margin-bottom: 5px; }
        .action-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.02); }
        .btn-watch { color: #ffd700; }
        .btn-share { color: #3498db; }
        .btn-download { color: #2ecc71; }
        
        .ia-section {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .ia-box {
            background: rgba(255,215,0,0.08);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .ia-box h3 { color: #ffd700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .ia-input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .ia-input-group input { flex: 1; padding: 10px 15px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.3); border-radius: 30px; color: white; }
        .ia-input-group button { padding: 10px 20px; background: #ffd700; border: none; border-radius: 30px; color: #1a1a2e; font-weight: bold; cursor: pointer; }
        .ia-response { margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 16px; color: #ddd; display: none; }
        
        .replay-header { max-width: 1000px; margin: 30px auto 10px; padding: 0 15px; }
        .replay-header h2 { font-size: 1.3rem; border-left: 3px solid #ffd700; padding-left: 12px; }
        .search-bar { max-width: 1000px; margin: 10px auto; padding: 0 15px; position: relative; }
        .search-bar i { position: absolute; left: 25px; top: 12px; color: #ffd700; }
        .search-bar input { width: 100%; padding: 10px 10px 10px 35px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.3); border-radius: 30px; color: white; }
        .replay-grid { max-width: 1000px; margin: 0 auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .replay-card { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,215,0,0.2); transition: 0.2s; cursor: pointer; }
        .replay-card:hover { transform: translateY(-3px); border-color: #ffd700; }
        .replay-img { position: relative; aspect-ratio: 16/9; overflow: hidden; }
        .replay-img img { width: 100%; height: 100%; object-fit: cover; }
        .replay-info { padding: 12px; }
        .replay-title { font-weight: 600; font-size: 0.9rem; }
        .replay-date { font-size: 0.65rem; color: #ffd700; margin: 5px 0; }
        .replay-buttons { display: flex; gap: 8px; }
        .replay-buttons button { flex: 1; padding: 5px; border-radius: 6px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; background: none; }
        .replay-download { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .replay-share { background: rgba(52,152,219,0.2); color: #3498db; border: 1px solid #3498db; }
        
        .info-footer { background: linear-gradient(135deg, #0f0f1a, #0a0a0f); margin-top: 30px; padding: 20px; text-align: center; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .info-item i { color: #ffd700; font-size: 1.2rem; }
        .info-item p { font-size: 0.7rem; margin-top: 5px; }
        .info-item strong { font-size: 1rem; color: white; }
        
        .whatsapp-footer { text-align: center; padding: 20px; }
        .whatsapp-footer button { background: #25D366; border: none; padding: 12px 25px; border-radius: 50px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2ecc71; padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; transition: 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        @media (max-width: 600px) {
            .action-btn span { display: none; }
            .action-btn { padding: 8px 12px; }
            .replay-grid { grid-template-columns: 1fr; }
            .ia-input-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>IMPACT <span>TV</span></h1>
    <div class="slogan">« La Télévision du Royaume des Cieux »</div>
</div>

<div class="player-container">
    <div class="video-box">
        <div class="live-badge"><i class="fas fa-circle"></i> EN DIRECT</div>
        <video id="mainVideo" controls poster="https://via.placeholder.com/1280x720/1a1a2e/ffd700?text=Impact+TV">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>
    
    <div class="action-bar">
        <button class="action-btn btn-watch" id="watchBtn"><i class="fas fa-play"></i><span>Regarder</span></button>
        <button class="action-btn btn-share" id="shareBtn"><i class="fas fa-share-alt"></i><span>Partager</span></button>
        <button class="action-btn btn-download" id="downloadBtn"><i class="fas fa-download"></i><span>Télécharger</span></button>
    </div>
</div>

<div class="ia-section">
    <div class="ia-box">
        <h3><i class="fas fa-robot"></i> Assistant Biblique</h3>
        <div class="ia-input-group">
            <input type="text" id="iaQuestion" placeholder="Posez votre question...">
            <button id="askIaBtn">Envoyer</button>
        </div>
        <div id="iaResponse" class="ia-response"></div>
    </div>
</div>

<div class="replay-header"><h2>📺 DERNIÈRES ÉMISSIONS</h2></div>
<div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Rechercher une émission..."></div>
<div class="replay-grid" id="replayGrid">
    <div class="replay-card" data-title="Culte du Dimanche">
        <div class="replay-img" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte du Dimanche')">
            <img src="https://via.placeholder.com/400x225/1a1a2e/ffd700?text=Culte">
        </div>
        <div class="replay-info">
            <div class="replay-title">Culte du Dimanche - Réveil Spirituel</div>
            <div class="replay-date">24 mars 2024</div>
            <div class="replay-buttons">
                <button class="replay-download" onclick="event.stopPropagation(); downloadVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte du Dimanche')"><i class="fas fa-download"></i> Télécharger</button>
                <button class="replay-share" onclick="event.stopPropagation(); shareVideo('Culte du Dimanche', 'https://www.w3schools.com/html/mov_bbb.mp4')"><i class="fas fa-share-alt"></i> Partager</button>
            </div>
        </div>
    </div>
    <div class="replay-card" data-title="Enseignement Biblique">
        <div class="replay-img" onclick="playVideo('https://www.w3schools.com/html/movie.mp4', 'Enseignement Biblique')">
            <img src="https://via.placeholder.com/400x225/1a1a2e/ffd700?text=Enseignement">
        </div>
        <div class="replay-info">
            <div class="replay-title">Enseignement Biblique - La Puissance de la Foi</div>
            <div class="replay-date">23 mars 2024</div>
            <div class="replay-buttons">
                <button class="replay-download" onclick="event.stopPropagation(); downloadVideo('https://www.w3schools.com/html/movie.mp4', 'Enseignement Biblique')"><i class="fas fa-download"></i> Télécharger</button>
                <button class="replay-share" onclick="event.stopPropagation(); shareVideo('Enseignement Biblique', 'https://www.w3schools.com/html/movie.mp4')"><i class="fas fa-share-alt"></i> Partager</button>
            </div>
        </div>
    </div>
</div>

<div class="info-footer">
    <div class="info-item"><i class="fas fa-satellite-dish"></i><p>Canal+ <strong id="canalText">n°424</strong></p></div>
    <div class="info-item"><i class="fas fa-tv"></i><p>TNT <strong id="tntText">n°4</strong></p></div>
    <div class="info-item"><i class="fas fa-globe"></i><p>www.impacttv.bf</p></div>
</div>

<div class="whatsapp-footer"><button id="whatsappButton"><i class="fab fa-whatsapp"></i> WhatsApp : <span id="whatsappNumber">25 36 72 72</span></button></div>

<div id="toast" class="toast"></div>

<script>
    // ==================== FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyAetkuLcYgAfdkuwvMjZ11WukfgFHnbulo",
        authDomain: "faso-opportunites-57088.firebaseapp.com",
        projectId: "faso-opportunites-57088",
        storageBucket: "faso-opportunites-57088.firebasestorage.app",
        messagingSenderId: "489210307173",
        appId: "1:489210307173:web:1a14ce1e19ff0054331c8c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const liveUrlRef = database.ref('direct/liveUrl');
    const canalRef = database.ref('info/canal');
    const tntRef = database.ref('info/tnt');
    const whatsappRef = database.ref('info/whatsapp');
    
    // ==================== VARIABLES ====================
    let currentLiveUrl = null;
    let currentVideoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";
    let currentVideoTitle = "Impact TV - Direct";
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = isError ? 'toast error show' : 'toast show';
        setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    function playVideo(url, title) {
        const video = document.getElementById('mainVideo');
        video.src = url;
        video.load();
        video.play().catch(e => console.log("Lecture auto bloquée"));
        currentVideoUrl = url;
        currentVideoTitle = title;
        showToast('📺 Lecture: ' + title);
    }
    
    function playLive() {
        if (currentLiveUrl) {
            playVideo(currentLiveUrl, 'Impact TV - Direct');
        } else {
            showToast('Aucun lien de direct configuré', true);
        }
    }
    
    document.getElementById('watchBtn').onclick = () => playLive();
    
    // ==================== SYNC FIREBASE EN TEMPS RÉEL ====================
    liveUrlRef.on('value', (snapshot) => {
        const url = snapshot.val();
        if (url) {
            currentLiveUrl = url;
            console.log('✅ Nouveau lien direct reçu :', url);
            showToast('📡 Le direct a été mis à jour par l\'admin');
        }
    });
    
    canalRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) document.getElementById('canalText').innerText = val;
    });
    
    tntRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) document.getElementById('tntText').innerText = val;
    });
    
    whatsappRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) {
            const formatted = `${val.slice(0,2)} ${val.slice(2,4)} ${val.slice(4,6)} ${val.slice(6,8)}`;
            const waBtn = document.getElementById('whatsappButton');
            waBtn.innerHTML = `<i class="fab fa-whatsapp"></i> WhatsApp : ${formatted}`;
            waBtn.onclick = () => window.open(`https://wa.me/226${val}?text=Bonjour%20Impact%20TV`, '_blank');
        }
    });
    
    // ==================== RECHERCHE ÉMISSIONS ====================
    document.getElementById('searchInput').oninput = function(e) {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.replay-card').forEach(card => {
            const title = card.querySelector('.replay-title').textContent.toLowerCase();
            card.style.display = title.includes(term) ? '' : 'none';
        });
    };
    
    // ==================== PARTAGE ====================
    function openNativeShare(title, text, url) {
        if (navigator.share) {
            navigator.share({ title, text, url }).catch(e => console.log);
        } else {
            navigator.clipboard.writeText(url).then(() => showToast('📋 Lien copié !'));
        }
    }
    
    document.getElementById('shareBtn').onclick = () => {
        openNativeShare(currentVideoTitle, 'Regardez ' + currentVideoTitle + ' sur Impact TV', window.location.href);
    };
    
    window.shareVideo = (title, url) => {
        openNativeShare(title, 'Regardez "' + title + '" sur Impact TV', url);
    };
    
    // ==================== TÉLÉCHARGEMENT ====================
    window.downloadVideo = function(url, title) {
        fetch(url).then(r => r.blob()).then(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Impact_TV_' + title.replace(/[^a-z0-9]/gi, '_') + '.mp4';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('✅ Téléchargement démarré !');
        }).catch(() => { window.open(url, '_blank'); showToast('Ouverture dans nouvel onglet'); });
    };
    
    document.getElementById('downloadBtn').onclick = () => {
        window.downloadVideo(currentVideoUrl, currentVideoTitle);
    };
    
    // ==================== ASSISTANT BIBLIQUE ====================
    const GEMINI_API_KEY = 'AQ.Ab8RN6JEkhrGGXNj5d_MDn8eO2dIB0yixIHO7Yuhslh-ODvlYA';
    const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemma-4-31b-it:generateContent';
    
    async function askAssistant(question) {
        try {
            const response = await fetch(`${GEMINI_URL}?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: question }] }],
                    generationConfig: { temperature: 0.8, maxOutputTokens: 300 }
                })
            });
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Désolé, je n'ai pas pu répondre. 🙏";
        } catch (error) {
            return "Erreur technique. Réessaie plus tard. 😊";
        }
    }
    
    document.getElementById('askIaBtn').onclick = async () => {
        const question = document.getElementById('iaQuestion').value.trim();
        if (!question) return showToast('📝 Posez une question');
        const responseDiv = document.getElementById('iaResponse');
        responseDiv.style.display = 'block';
        responseDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Assistant réfléchit...';
        const answer = await askAssistant(question);
        responseDiv.innerHTML = `<strong>🤖 Assistant biblique :</strong><br>${answer}`;
        document.getElementById('iaQuestion').value = '';
    };
    
    document.getElementById('iaQuestion').onkeypress = (e) => {
        if (e.key === 'Enter') document.getElementById('askIaBtn').click();
    };
    
    showToast('✅ Impact TV prêt - Mode temps réel activé');
</script>
</body>
  </html>
