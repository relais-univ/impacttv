<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact TV – Officiel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }
        
        /* Header Style TikTok */
        .header { background: #1a1a2e; padding: 15px; text-align: center; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.5rem; color: #3b82f6; }
        .header span { color: #ff8c00; }

        .container { max-width: 800px; margin: 0 auto; padding: 10px; }

        /* Player Vidéo */
        .video-box { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 1px solid #333; }
        video { width: 100%; height: 100%; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: #ff4d4d; padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; }

        /* Barre d'actions TikTok Style */
        .action-bar { display: flex; justify-content: space-around; background: #161b22; border-radius: 50px; padding: 10px; margin: 15px 0; border: 1px solid rgba(255,215,0,0.2); }
        .btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .btn i { font-size: 1.4rem; margin-bottom: 4px; }
        .btn span { font-size: 0.75rem; font-weight: 600; color: #aaa; }
        .btn.active i { color: #ff4d4d; transform: scale(1.2); animation: pop 0.3s; }
        .btn.active span { color: #fff; }

        /* Assistant Biblique */
        .bible-card { background: #161b22; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px dotted #ffd700; }
        .bible-card h3 { font-size: 0.9rem; color: #ffd700; margin-bottom: 10px; text-transform: uppercase; }
        .search-row { display: flex; background: #0d1117; border-radius: 25px; padding: 4px; border: 1px solid #333; }
        .search-row input { flex: 1; background: none; border: none; color: #fff; padding: 8px 12px; outline: none; }
        .search-row button { background: #ffd700; border: none; width: 35px; height: 35px; border-radius: 50%; color: #000; cursor: pointer; }
        
        /* C'est ce cadre qui va recevoir le texte */
        #bibleRes { display: none; margin-top: 15px; border-left: 3px solid #3b82f6; padding-left: 10px; font-size: 1rem; font-style: italic; color: #ddd; line-height: 1.5; }

        /* Grille des Replays */
        .section-title { font-size: 1rem; margin: 20px 0 10px; color: #ffd700; border-left: 3px solid #ffd700; padding-left: 10px; }
        .replay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .replay-card { background: #1a1a2e; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #222; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .replay-info { padding: 8px; position: relative; }
        .replay-info h4 { font-size: 0.75rem; width: 85%; }
        .dl-btn { position: absolute; right: 5px; bottom: 5px; color: #2ecc71; cursor: pointer; font-size: 1.2rem; }

        /* WhatsApp & Footer */
        .wa-footer { text-align: center; padding: 20px; }
        .wa-btn { background: #25D366; color: #fff; border: none; padding: 12px 20px; border-radius: 30px; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #3b82f6; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; transition: 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes pop { 0%{transform: scale(1)} 50%{transform: scale(1.4)} 100%{transform: scale(1.2)} }
    </style>
</head>
<body>

<div class="header">
    <h1>IMPACT <span>TV</span></h1>
</div>

<div class="container">
    <div class="video-box">
        <div class="live-tag">🔴 DIRECT</div>
        <video id="mainVid" controls poster="https://via.placeholder.com/640x360/1a1a2e/ffd700?text=Impact+TV+Live">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>

    <div class="action-bar">
        <button class="btn" id="likeBtn">
            <i class="far fa-heart"></i>
            <span id="lkCount">12.4k</span>
        </button>
        <button class="btn" onclick="document.getElementById('bibleInput').focus()">
            <i class="far fa-comment"></i>
            <span>850</span>
        </button>
        <button class="btn" onclick="shareApp()">
            <i class="fas fa-share"></i>
            <span>Partager</span>
        </button>
        <button class="btn" onclick="downloadMain()">
            <i class="fas fa-cloud-download-alt"></i>
            <span>Galerie</span>
        </button>
    </div>

    <div class="bible-card">
        <h3>📖 Assistant Biblique</h3>
        <div class="search-row">
            <input type="text" id="bibleInput" placeholder="Ex: Jean 3.16">
            <button onclick="getBible()"><i class="fas fa-search"></i></button>
        </div>
        <div id="bibleRes">
            <strong id="bRef" style="color:#ffd700; display:block; margin-bottom:5px;"></strong>
            <span id="bText"></span>
        </div>
    </div>

    <div class="section-title">DERNIÈRES ÉMISSIONS</div>
    <div class="replay-grid">
        <div class="replay-card">
            <div class="thumb" onclick="playThis('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte de Réveil')">
                <i class="fas fa-play" style="opacity:0.5"></i>
            </div>
            <div class="replay-info">
                <h4>Culte de Réveil</h4>
                <i class="fas fa-arrow-circle-down dl-btn" onclick="downloadVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte')"></i>
            </div>
        </div>
        <div class="replay-card">
            <div class="thumb" onclick="playThis('https://www.w3schools.com/html/movie.mp4', 'Enseignement Foi')">
                <i class="fas fa-play" style="opacity:0.5"></i>
            </div>
            <div class="replay-info">
                <h4>La Puissance de la Foi</h4>
                <i class="fas fa-arrow-circle-down dl-btn" onclick="downloadVideo('https://www.w3schools.com/html/movie.mp4', 'Enseignement')"></i>
            </div>
        </div>
    </div>

    <div class="wa-footer">
        <a href="https://wa.me/22625367272" class="wa-btn">
            <i class="fab fa-whatsapp"></i> WhatsApp : 25 36 72 72
        </a>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let currentLikes = 12400;

    function format(n) {
        return n >= 1000 ? (n/1000).toFixed(1) + 'k' : n;
    }

    function showT(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'), 2500);
    }

    // Gestion Like
    document.getElementById('likeBtn').onclick = function() {
        this.classList.toggle('active');
        const icon = this.querySelector('i');
        if(this.classList.contains('active')) {
            currentLikes++;
            icon.className = 'fas fa-heart';
            showT("❤️ Vous aimez cette émission");
        } else {
            currentLikes--;
            icon.className = 'far fa-heart';
        }
        document.getElementById('lkCount').textContent = format(currentLikes);
    };

    // RECHERCHE BIBLE MISE À JOUR POUR AFFICHAGE IMMÉDIAT
    async function getBible() {
        const input = document.getElementById('bibleInput');
        const resDiv = document.getElementById('bibleRes');
        const val = input.value.trim();
        
        if(!val) return;
        
        showT("🔍 Recherche du verset...");
        
        // On remplace le point par ":" pour l'API (ex: Jean 3.16 -> Jean 3:16)
        const cleanVal = val.replace('.', ':');
        
        try {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://bible-api.com/'+cleanVal+'?translation=lsg')}`);
            const data = await response.json();
            const bible = JSON.parse(data.contents);
            
            if(bible && bible.text) {
                // On remplit les balises existantes dans ton cadre
                document.getElementById('bRef').textContent = bible.reference;
                document.getElementById('bText').textContent = bible.text;
                
                // ACTION CRUCIALE : On rend le cadre visible
                resDiv.style.display = 'block';
                
                showT("📖 Parole trouvée !");
            } else {
                showT("❌ Verset non trouvé");
            }
        } catch(e) { 
            showT("📡 Erreur réseau"); 
            console.error(e);
        }
    }

    // Vidéo et Téléchargement
    function playThis(url, title) {
        const v = document.getElementById('mainVid');
        v.src = url; v.play();
        window.scrollTo({top:0, behavior:'smooth'});
        showT("📺 Lecture : " + title);
    }

    function downloadVideo(url, name) {
        showT("📥 Téléchargement vers galerie...");
        const a = document.createElement('a');
        a.href = url; a.download = name + ".mp4";
        a.click();
    }

    function downloadMain() {
        downloadVideo(document.getElementById('mainVid').src, "ImpactTV_Direct");
    }

    function shareApp() {
        if(navigator.share) navigator.share({title:'Impact TV', url: window.location.href});
        else showT("📋 Lien copié !");
    }

    // Permet de lancer la recherche aussi avec la touche "Entrée" du clavier
    document.getElementById('bibleInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') getBible();
    });
</script>
</body>
  </html>
