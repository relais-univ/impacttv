<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact TV – Officiel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; padding-bottom: 30px; }
        
        .header { background: #1a1a2e; padding: 15px; text-align: center; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.4rem; color: #3b82f6; }
        .header span { color: #ff8c00; }

        .container { max-width: 800px; margin: 0 auto; padding: 10px; }

        /* Player Vidéo */
        .video-box { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 1px solid #333; }
        video { width: 100%; height: 100%; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: #ff4d4d; padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; }

        /* Actions TikTok Style */
        .action-bar { display: flex; justify-content: space-around; background: #161b22; border-radius: 50px; padding: 10px; margin: 15px 0; border: 1px solid rgba(255,215,0,0.2); }
        .btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .btn i { font-size: 1.4rem; margin-bottom: 4px; }
        .btn span { font-size: 0.7rem; font-weight: 600; color: #aaa; }
        .btn.active i { color: #ff4d4d; transform: scale(1.1); }

        /* Section Bible */
        .bible-card { background: #161b22; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .search-row { display: flex; background: #0d1117; border-radius: 25px; padding: 5px; border: 1px solid #444; margin-bottom: 12px; }
        .search-row input { flex: 1; background: none; border: none; color: #fff; padding: 8px 15px; outline: none; font-size: 0.95rem; }
        .search-row button { background: #ffd700; border: none; width: 40px; height: 40px; border-radius: 50%; color: #000; cursor: pointer; }
        
        /* LA FEUILLE BLANCHE (Le réglage que tu as demandé) */
        #bibleRes { 
            display: none; 
            padding: 20px; 
            background: #ffffff; /* Fond blanc comme une feuille */
            border-radius: 12px; 
            margin-top: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }
        #bRef { 
            color: #3b82f6; /* Bleu pour la référence */
            font-weight: 800; 
            display: block; 
            margin-bottom: 10px; 
            font-size: 1.1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        #bText { 
            color: #222; /* Texte noir sur blanc pour la clarté */
            line-height: 1.7; 
            font-size: 1.05rem;
            font-family: 'Georgia', serif; /* Police type livre */
        }

        .section-title { font-size: 0.9rem; margin: 25px 0 12px; color: #ffd700; text-transform: uppercase; letter-spacing: 1px; }
        .replay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .replay-card { background: #1a1a2e; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #ffd700; }
        .replay-info { padding: 8px; position: relative; }
        .dl-btn { position: absolute; right: 10px; bottom: 8px; color: #2ecc71; cursor: pointer; font-size: 1.1rem; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #3b82f6; padding: 10px 20px; border-radius: 30px; font-size: 0.8rem; transition: 0.3s; z-index: 1000; color: white; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1>IMPACT <span>TV</span></h1>
</div>

<div class="container">
    <div class="video-box">
        <div class="live-tag">🔴 DIRECT</div>
        <video id="mainVid" controls poster="https://via.placeholder.com/640x360/1a1a2e/ffd700?text=Direct+Impact+TV">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>

    <div class="action-bar">
        <button class="btn" id="likeBtn"><i class="far fa-heart"></i><span id="lkCount">12.4k</span></button>
        <button class="btn" onclick="document.getElementById('bibleInput').focus()"><i class="far fa-comment"></i><span>850</span></button>
        <button class="btn" onclick="shareApp()"><i class="fas fa-share"></i><span>Partager</span></button>
        <button class="btn" onclick="downloadMain()"><i class="fas fa-download"></i><span>Galerie</span></button>
    </div>

    <div class="bible-card">
        <h3 style="font-size: 0.75rem; color: #ffd700; margin-bottom: 10px; opacity: 0.8;">📖 RECHERCHE BIBLIQUE</h3>
        <div class="search-row">
            <input type="text" id="bibleInput" placeholder="Ex: Jean 3.16">
            <button onclick="getBible()"><i class="fas fa-search"></i></button>
        </div>
        
        <div id="bibleRes">
            <strong id="bRef"></strong>
            <p id="bText"></p>
        </div>
    </div>

    <div class="section-title">Anciennes Émissions</div>
    <div class="replay-grid">
        <div class="replay-card">
            <div class="thumb" onclick="playThis('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte')"><i class="fas fa-play"></i></div>
            <div class="replay-info">
                <h4 style="font-size: 0.7rem; font-weight: 400;">Culte de Réveil</h4>
                <i class="fas fa-arrow-circle-down dl-btn" onclick="downloadVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte')"></i>
            </div>
        </div>
        <div class="replay-card">
            <div class="thumb" onclick="playThis('https://www.w3schools.com/html/movie.mp4', 'Foi')"><i class="fas fa-play"></i></div>
            <div class="replay-info">
                <h4 style="font-size: 0.7rem; font-weight: 400;">La Puissance de la Foi</h4>
                <i class="fas fa-arrow-circle-down dl-btn" onclick="downloadVideo('https://www.w3schools.com/html/movie.mp4', 'Foi')"></i>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let currentLikes = 12400;

    function showT(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'), 3000);
    }

    async function getBible() {
        const val = document.getElementById('bibleInput').value.trim();
        const resBox = document.getElementById('bibleRes');
        if(!val) return;
        
        showT("🔍 Recherche du verset...");
        
        const query = val.replace('.', ':');
        const apiUrl = `https://bible-api.com/${encodeURIComponent(query)}?translation=lsg`;

        try {
            const res = await fetch(apiUrl);
            const data = await res.json();
            
            if(data && data.text) {
                document.getElementById('bRef').textContent = data.reference;
                document.getElementById('bText').textContent = data.text;
                resBox.style.display = "block";
                resBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                showT("📖 Parole trouvée");
            } else {
                showT("❌ Verset non trouvé");
            }
        } catch(e) {
            try {
                const proxyRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`);
                const proxyData = await proxyRes.json();
                const data = JSON.parse(proxyData.contents);
                document.getElementById('bRef').textContent = data.reference;
                document.getElementById('bText').textContent = data.text;
                resBox.style.display = "block";
                showT("📖 Parole trouvée !");
            } catch(err) {
                showT("📡 Erreur de connexion");
            }
        }
    }

    function playThis(url, t) {
        const v = document.getElementById('mainVid');
        v.src = url; v.play();
        window.scrollTo({top: 0, behavior: 'smooth'});
        showT("📺 Lecture : " + t);
    }

    function downloadVideo(url, name) {
        showT("📥 Téléchargement...");
        const a = document.createElement('a');
        a.href = url; a.download = name + ".mp4";
        a.click();
    }

    function downloadMain() {
        downloadVideo(document.getElementById('mainVid').src, "ImpactTV_Direct");
    }

    document.getElementById('likeBtn').onclick = function() {
        this.classList.toggle('active');
        currentLikes = this.classList.contains('active') ? currentLikes + 1 : currentLikes - 1;
        document.getElementById('lkCount').textContent = currentLikes >= 1000 ? (currentLikes/1000).toFixed(1) + 'k' : currentLikes;
        this.querySelector('i').className = this.classList.contains('active') ? 'fas fa-heart' : 'far fa-heart';
    };

    function shareApp() {
        if(navigator.share) navigator.share({title:'Impact TV', url: window.location.href});
        else showT("📋 Lien copié");
    }
</script>
</body>
</html>
