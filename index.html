<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Impact TV – La Télévision du Royaume des Cieux</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }
        .header { background: linear-gradient(135deg, #0a0a0f, #1a1a2e); padding: 20px; text-align: center; border-bottom: 3px solid #ffd700; }
        .header h1 { font-size: 2rem; font-weight: 800; color: #3b82f6; }
        .header h1 span { color: #ff8c00; }
        .slogan { font-size: 0.8rem; color: #ff8c00; margin-top: 5px; }
        
        .player-container { max-width: 1000px; margin: 15px auto; padding: 0 15px; }
        .video-box { position: relative; background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; outline: none; background: #000; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: #e74c3c; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: flex; align-items: center; gap: 5px; z-index: 15; }
        .live-badge i { animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .action-bar {
            display: flex;
            justify-content: space-around;
            background: #1a1a2e;
            border-radius: 60px;
            padding: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .action-btn {
            background: none;
            border: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            font-weight: 500;
        }
        .action-btn i { font-size: 1.5rem; margin-bottom: 5px; }
        .action-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.02); }
        .btn-watch { color: #ffd700; }
        .btn-like { color: white; }
        .btn-like.liked { color: #ff4d4d; }
        .btn-comment { color: #f39c12; }
        .btn-share { color: #3498db; }
        .btn-download { color: #2ecc71; }
        
        .comments-area { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .comments-box { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; }
        .comments-box h3 { color: #ffd700; margin-bottom: 15px; }
        .comment-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-row input { flex: 1; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 30px; color: white; }
        .comment-row button { padding: 10px 20px; background: #ffd700; border: none; border-radius: 30px; color: #1a1a2e; font-weight: bold; cursor: pointer; }
        .comment-list { max-height: 250px; overflow-y: auto; }
        .comment-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        .comment-name { color: #ffd700; font-size: 0.7rem; }
        .comment-text { font-size: 0.8rem; margin-top: 4px; }
        .empty-comments { text-align: center; padding: 20px; color: #888; }
        
        .replay-header { max-width: 1000px; margin: 30px auto 10px; padding: 0 15px; }
        .replay-header h2 { font-size: 1.3rem; border-left: 3px solid #ffd700; padding-left: 12px; }
        .search-bar { max-width: 1000px; margin: 10px auto; padding: 0 15px; position: relative; }
        .search-bar i { position: absolute; left: 25px; top: 12px; color: #ffd700; }
        .search-bar input { width: 100%; padding: 10px 10px 10px 35px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.3); border-radius: 30px; color: white; }
        .replay-grid { max-width: 1000px; margin: 0 auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .replay-card { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,215,0,0.2); transition: 0.2s; cursor: pointer; }
        .replay-card:hover { transform: translateY(-3px); border-color: #ffd700; }
        .replay-img { position: relative; aspect-ratio: 16/9; overflow: hidden; }
        .replay-img img { width: 100%; height: 100%; object-fit: cover; }
        .replay-info { padding: 12px; }
        .replay-title { font-weight: 600; font-size: 0.9rem; }
        .replay-date { font-size: 0.65rem; color: #ffd700; margin: 5px 0; }
        .replay-stats { display: flex; gap: 12px; font-size: 0.7rem; color: #888; margin-bottom: 8px; }
        .replay-stats span { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .replay-buttons { display: flex; gap: 8px; }
        .replay-buttons button { flex: 1; padding: 5px; border-radius: 6px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; background: none; }
        .replay-download { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .replay-share { background: rgba(52,152,219,0.2); color: #3498db; border: 1px solid #3498db; }
        
        .info-footer { background: linear-gradient(135deg, #0f0f1a, #0a0a0f); margin-top: 30px; padding: 20px; text-align: center; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .info-item i { color: #ffd700; font-size: 1.2rem; }
        .info-item p { font-size: 0.7rem; margin-top: 5px; }
        .info-item strong { font-size: 1rem; color: white; }
        
        .whatsapp-footer { text-align: center; padding: 20px; }
        .whatsapp-footer button { background: #25D366; border: none; padding: 12px 25px; border-radius: 50px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2ecc71; padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; transition: 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        @media (max-width: 600px) {
            .action-btn span { display: none; }
            .action-btn { padding: 8px 12px; }
            .replay-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>IMPACT <span>TV</span></h1>
    <div class="slogan">« La Télévision du Royaume des Cieux »</div>
</div>

<div class="player-container">
    <div class="video-box">
        <div class="live-badge"><i class="fas fa-circle"></i> EN DIRECT</div>
        <video id="mainVideo" controls poster="https://via.placeholder.com/1280x720/1a1a2e/ffd700?text=Impact+TV">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>
    
    <div class="action-bar">
        <button class="action-btn btn-watch" id="watchBtn"><i class="fas fa-play"></i><span>Regarder</span></button>
        <button class="action-btn btn-like" id="likeBtn"><i class="far fa-heart"></i><span id="likeCount">0</span></button>
        <button class="action-btn btn-comment" id="commentScrollBtn"><i class="far fa-comment"></i><span id="commentCount">0</span></button>
        <button class="action-btn btn-share" id="shareBtn"><i class="fas fa-share-alt"></i><span>Partager</span></button>
        <button class="action-btn btn-download" id="downloadBtn"><i class="fas fa-download"></i><span>Télécharger</span></button>
    </div>
</div>

<div class="comments-area" id="commentsSection">
    <div class="comments-box">
        <h3><i class="fas fa-comments"></i> Commentaires</h3>
        <div class="comment-row">
            <input type="text" id="commentInput" placeholder="Écrivez votre commentaire...">
            <button id="postCommentBtn">Envoyer</button>
        </div>
        <div class="comment-list" id="commentList">
            <div class="empty-comments">Soyez le premier à commenter !</div>
        </div>
    </div>
</div>

<div class="replay-header"><h2>📺 DERNIÈRES ÉMISSIONS</h2></div>
<div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Rechercher une émission..."></div>
<div class="replay-grid" id="replayGrid">
    <div class="replay-card" data-title="Culte du Dimanche">
        <div class="replay-img" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte du Dimanche')">
            <img src="https://via.placeholder.com/400x225/1a1a2e/ffd700?text=Culte">
        </div>
        <div class="replay-info">
            <div class="replay-title">Culte du Dimanche - Réveil Spirituel</div>
            <div class="replay-date">24 mars 2024</div>
            <div class="replay-stats">
                <span onclick="event.stopPropagation(); likeReplay(this)"><i class="far fa-heart"></i> 0</span>
                <span><i class="far fa-comment"></i> 0</span>
            </div>
            <div class="replay-buttons">
                <button class="replay-download" onclick="event.stopPropagation(); downloadVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Culte du Dimanche')"><i class="fas fa-download"></i> Télécharger</button>
                <button class="replay-share" onclick="event.stopPropagation(); shareVideo('Culte du Dimanche', 'https://www.w3schools.com/html/mov_bbb.mp4')"><i class="fas fa-share-alt"></i> Partager</button>
            </div>
        </div>
    </div>
    <div class="replay-card" data-title="Enseignement Biblique">
        <div class="replay-img" onclick="playVideo('https://www.w3schools.com/html/movie.mp4', 'Enseignement Biblique')">
            <img src="https://via.placeholder.com/400x225/1a1a2e/ffd700?text=Enseignement">
        </div>
        <div class="replay-info">
            <div class="replay-title">Enseignement Biblique - La Puissance de la Foi</div>
            <div class="replay-date">23 mars 2024</div>
            <div class="replay-stats">
                <span onclick="event.stopPropagation(); likeReplay(this)"><i class="far fa-heart"></i> 0</span>
                <span><i class="far fa-comment"></i> 0</span>
            </div>
            <div class="replay-buttons">
                <button class="replay-download" onclick="event.stopPropagation(); downloadVideo('https://www.w3schools.com/html/movie.mp4', 'Enseignement Biblique')"><i class="fas fa-download"></i> Télécharger</button>
                <button class="replay-share" onclick="event.stopPropagation(); shareVideo('Enseignement Biblique', 'https://www.w3schools.com/html/movie.mp4')"><i class="fas fa-share-alt"></i> Partager</button>
            </div>
        </div>
    </div>
</div>

<div class="info-footer">
    <div class="info-item"><i class="fas fa-satellite-dish"></i><p>Canal+ <strong>n°424</strong></p></div>
    <div class="info-item"><i class="fas fa-tv"></i><p>TNT <strong>n°4</strong></p></div>
    <div class="info-item"><i class="fas fa-globe"></i><p>www.impacttv.bf</p></div>
</div>

<div class="whatsapp-footer"><button id="whatsappButton"><i class="fab fa-whatsapp"></i> WhatsApp : 25 36 72 72</button></div>

<div id="toast" class="toast"></div>

<script>
    // ==================== FONCTIONS ====================
    let likeCount = 0;
    let commentCount = 0;
    let commentsList = [];
    let currentVideoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";
    let currentVideoTitle = "Impact TV - Direct";
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function playVideo(url, title) {
        const video = document.getElementById('mainVideo');
        video.src = url;
        video.load();
        video.play();
        currentVideoUrl = url;
        currentVideoTitle = title;
        showToast('📺 Lecture: ' + title);
    }
    
    // BOUTON REGARDER
    document.getElementById('watchBtn').onclick = function() {
        playVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Impact TV - Direct');
    };
    
    // BOUTON LIKE
    document.getElementById('likeBtn').onclick = function() {
        const btn = this;
        const countSpan = document.getElementById('likeCount');
        const isLiked = btn.classList.contains('liked');
        
        if (isLiked) {
            likeCount--;
            btn.classList.remove('liked');
            btn.innerHTML = `<i class="far fa-heart"></i><span>${likeCount}</span>`;
            showToast('Like retiré');
        } else {
            likeCount++;
            btn.classList.add('liked');
            btn.innerHTML = `<i class="fas fa-heart"></i><span>${likeCount}</span>`;
            showToast('❤️ Merci pour votre like !');
            btn.style.transform = 'scale(1.2)';
            setTimeout(() => btn.style.transform = '', 200);
        }
        countSpan.textContent = likeCount;
    };
    
    // BOUTON COMMENTAIRE (scroll)
    document.getElementById('commentScrollBtn').onclick = function() {
        document.getElementById('commentsSection').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('commentInput').focus();
    };
    
    // ENVOYER COMMENTAIRE
    document.getElementById('postCommentBtn').onclick = function() {
        const input = document.getElementById('commentInput');
        const text = input.value.trim();
        if (text === '') {
            showToast('Écrivez un commentaire d\'abord');
            return;
        }
        
        commentCount++;
        document.getElementById('commentCount').textContent = commentCount;
        
        commentsList.unshift({
            text: text,
            date: new Date().toLocaleString('fr-FR')
        });
        
        const container = document.getElementById('commentList');
        if (commentsList.length === 0) {
            container.innerHTML = '<div class="empty-comments">Soyez le premier à commenter !</div>';
        } else {
            let html = '';
            for (let i = 0; i < commentsList.length; i++) {
                html += `<div class="comment-item">
                            <div class="comment-name"><i class="fas fa-user-circle"></i> Téléspectateur</div>
                            <div class="comment-text">${escapeHtml(commentsList[i].text)}</div>
                            <div class="comment-date">${commentsList[i].date}</div>
                        </div>`;
            }
            container.innerHTML = html;
        }
        
        input.value = '';
        showToast('Commentaire ajouté !');
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== PARTAGE NATIF (COMME TIKTOK/YOUTUBE) ==========
    // Cette fonction ouvre la feuille de partage du téléphone
    // avec TOUTES les applications installées (WhatsApp, Facebook, TikTok, etc.)
    function openNativeShare(title, text, url) {
        // Vérifie si le navigateur supporte le partage natif
        if (navigator.share) {
            // Sur mobile : ouvre la feuille native avec toutes les apps
            navigator.share({
                title: title,
                text: text,
                url: url
            }).catch(function(err) {
                // Si l'utilisateur annule, on ne fait rien
                if (err.name !== 'AbortError') {
                    console.log('Erreur de partage:', err);
                }
            });
        } else {
            // Sur ordinateur : on copie le lien
            navigator.clipboard.writeText(url).then(function() {
                showToast('📋 Lien copié !');
            }).catch(function() {
                showToast('Impossible de copier');
            });
        }
    }
    
    // Partager la vidéo en cours (bouton principal)
    document.getElementById('shareBtn').onclick = function() {
        openNativeShare(
            currentVideoTitle,
            'Regardez ' + currentVideoTitle + ' sur Impact TV - La Télévision du Royaume des Cieux',
            window.location.href
        );
    };
    
    // Partager un replay (depuis la grille)
    function shareVideo(title, videoUrl) {
        openNativeShare(
            title,
            'Regardez "' + title + '" sur Impact TV - La Télévision du Royaume des Cieux',
            window.location.origin + window.location.pathname + '?video=' + encodeURIComponent(videoUrl)
        );
    }
    
    // TÉLÉCHARGEMENT
    function downloadVideo(url, title) {
        fetch(url).then(function(response) { return response.blob(); }).then(function(blob) {
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Impact_TV_' + title.replace(/[^a-z0-9]/gi, '_') + '.mp4';
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('✅ Téléchargement démarré !');
        }).catch(function() {
            window.open(url, '_blank');
            showToast('Ouverture dans un nouvel onglet');
        });
    }
    
    document.getElementById('downloadBtn').onclick = function() {
        downloadVideo(currentVideoUrl, currentVideoTitle);
    };
    
    // WHATSAPP
    document.getElementById('whatsappButton').onclick = function() {
        window.open('https://wa.me/22625367272?text=Bonjour%20Impact%20TV', '_blank');
    };
    
    // RECHERCHE
    document.getElementById('searchInput').oninput = function(e) {
        var searchTerm = e.target.value.toLowerCase();
        var cards = document.querySelectorAll('.replay-card');
        for (var i = 0; i < cards.length; i++) {
            var title = cards[i].querySelector('.replay-title').textContent.toLowerCase();
            if (title.indexOf(searchTerm) !== -1) {
                cards[i].style.display = '';
            } else {
                cards[i].style.display = 'none';
            }
        }
    };
    
    // LIKE SUR REPLAY
    function likeReplay(element) {
        var span = element;
        var isLiked = span.style.color === 'rgb(255, 77, 77)';
        var text = span.textContent;
        var match = text.match(/\d+/);
        var count = match ? parseInt(match[0]) : 0;
        
        if (isLiked) {
            count--;
            span.style.color = '';
            span.innerHTML = '<i class="far fa-heart"></i> ' + count;
            showToast('Like retiré');
        } else {
            count++;
            span.style.color = '#ff4d4d';
            span.innerHTML = '<i class="fas fa-heart"></i> ' + count;
            showToast('❤️ Like ajouté !');
        }
    }
    
    // ENVOYER AVEC ENTRÉE
    document.getElementById('commentInput').onkeypress = function(e) {
        if (e.key === 'Enter') {
            document.getElementById('postCommentBtn').click();
        }
    };
    
    // Exposer les fonctions globales
    window.playVideo = playVideo;
    window.downloadVideo = downloadVideo;
    window.shareVideo = shareVideo;
    window.likeReplay = likeReplay;
    
    showToast('✅ Application prête !');
</script>
</body>
</html>
